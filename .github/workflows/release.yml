# 发布流水线:在 GitHub 页面发布 Release(publish)时自动触发。
# 三平台原生 runner 构建 6 个 self-contained 产物,统一附加到该 Release:
#   Windows x64/arm64 → zip
#   macOS   x64/arm64 → tar.gz(未签名/未公证;Unix 可执行位在原生 runner 上保留)
#   Linux   x64/arm64 → tar.gz
# 另生成两份元数据:
#   SHA256SUMS.txt — 全部产物的校验和(人工核对用)
#   latest.json    — 应用内自更新清单(版本号/标签/各 RID 产物名+sha256+大小);
#                    应用经 releases/latest/download/latest.json 固定地址读取(stable 通道,
#                    不占 API 配额),preview 通道经 API 定位 Release 后取同名清单。
# 版本号取 Release 标签(去掉前缀 v),经 -p:Version 覆盖 Directory.Build.props,
# 关于页显示与产物命名自动一致 —— 发新版只需打标签发 Release,无需改代码。
name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  PROJECT: src/VelaShell/VelaShell.csproj

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore strong-name key
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("src/VelaShell.snk",
            [Convert]::FromBase64String($env:SNK_B64))
        env:
          SNK_B64: ${{ secrets.STRONG_NAME_KEY }}
      - name: Publish (win-x64 / win-arm64)
        shell: pwsh
        run: |
          $version = '${{ github.event.release.tag_name }}'.TrimStart('v')
          New-Item -ItemType Directory -Force dist | Out-Null
          foreach ($rid in @('win-x64', 'win-arm64')) {
            $name = "VelaShell-$version-$rid"
            dotnet publish $env:PROJECT -c Release -r $rid -o "out/$name" `
              -p:Version=$version -p:SelfContained=true -p:PublishSingleFile=true `
              -p:DebugType=None --nologo
            if ($LASTEXITCODE -ne 0) { exit 1 }
            Get-ChildItem "out/$name" -Recurse -File -Filter '*.pdb' | Remove-Item -Force
            Compress-Archive -Path "out/$name/*" -DestinationPath "dist/$name.zip" -Force
          }
      - uses: actions/upload-artifact@v4
        with:
          name: packages-windows
          path: dist/*
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore strong-name key
        # openssl 在 Linux/macOS 上解码行为一致(避开 GNU/BSD base64 -d/-D 差异)
        run: echo "$SNK_B64" | openssl base64 -A -d > src/VelaShell.snk
        env:
          SNK_B64: ${{ secrets.STRONG_NAME_KEY }}
      - name: Publish (osx-x64 / osx-arm64)
        run: |
          set -euo pipefail
          version="${TAG_NAME#v}"
          mkdir -p dist
          for rid in osx-x64 osx-arm64; do
            name="VelaShell-$version-$rid"
            dotnet publish "$PROJECT" -c Release -r "$rid" -o "out/$name" \
              -p:Version="$version" -p:SelfContained=true -p:PublishSingleFile=true -p:DebugType=None --nologo
            chmod +x "out/$name/VelaShell"
            tar -czf "dist/$name.tar.gz" -C "out/$name" .
          done
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: packages-macos
          path: dist/*
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore strong-name key
        # openssl 在 Linux/macOS 上解码行为一致(避开 GNU/BSD base64 -d/-D 差异)
        run: echo "$SNK_B64" | openssl base64 -A -d > src/VelaShell.snk
        env:
          SNK_B64: ${{ secrets.STRONG_NAME_KEY }}
      - name: Publish (linux-x64 / linux-arm64)
        run: |
          set -euo pipefail
          version="${TAG_NAME#v}"
          mkdir -p dist
          for rid in linux-x64 linux-arm64; do
            name="VelaShell-$version-$rid"
            dotnet publish "$PROJECT" -c Release -r "$rid" -o "out/$name" \
              -p:Version="$version" -p:SelfContained=true -p:PublishSingleFile=true -p:DebugType=None --nologo
            chmod +x "out/$name/VelaShell"
            tar -czf "dist/$name.tar.gz" -C "out/$name" .
          done
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: packages-linux
          path: dist/*
          if-no-files-found: error

  attach-to-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate latest.json (in-app update manifest)
        run: |
          set -euo pipefail
          cd dist
          VERSION="${TAG_NAME#v}"
          assets='{}'
          add_asset() {
            local rid="$1" file="$2"
            local sha size
            sha=$(sha256sum "$file" | cut -d' ' -f1)
            size=$(stat -c%s "$file")
            assets=$(jq --arg rid "$rid" --arg name "$file" --arg sha "$sha" --argjson size "$size" \
              '.[$rid] = {name: $name, sha256: $sha, size: $size}' <<< "$assets")
          }
          for rid in win-x64 win-arm64; do
            add_asset "$rid" "VelaShell-$VERSION-$rid.zip"
          done
          for rid in osx-x64 osx-arm64 linux-x64 linux-arm64; do
            add_asset "$rid" "VelaShell-$VERSION-$rid.tar.gz"
          done
          jq -n --arg version "$VERSION" --arg tag "$TAG_NAME" --argjson assets "$assets" \
            '{version: $version, tag: $tag, assets: $assets}' > latest.json
          cat latest.json
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
      - name: Generate SHA256SUMS.txt
        run: |
          set -euo pipefail
          cd dist
          # 对全部资产求和(排除清单自身,避免重定向先建出的空文件把自己算进去)
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -exec sha256sum {} + \
            | sed 's| \./| |' | sort -k2 > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Upload assets to release
        run: |
          set -euo pipefail
          gh release upload "$TAG_NAME" dist/* --clobber --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
