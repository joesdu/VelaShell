# 发布流水线:在 GitHub 页面发布 Release(publish)时自动触发。
# 三平台原生 runner 构建 8 个产物并生成 SHA256SUMS.txt,统一附加到该 Release:
#   Windows x64/arm64 × 含运行时 / 不含运行时(-noruntime)→ zip
#   macOS   x64/arm64 含运行时 → tar.gz(未签名/未公证;Unix 可执行位在原生 runner 上保留)
#   Linux   x64/arm64 含运行时 → tar.gz
# 版本号取 Release 标签(去掉前缀 v),经 -p:Version 覆盖 Directory.Build.props,
# 关于页显示与产物命名自动一致 —— 发新版只需打标签发 Release,无需改代码。
name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

env:
  PROJECT: src/VelaShell/VelaShell.csproj

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore strong-name key
        shell: pwsh
        run: |
          [IO.File]::WriteAllBytes("src/VelaShell.snk",
            [Convert]::FromBase64String($env:SNK_B64))
        env:
          SNK_B64: ${{ secrets.STRONG_NAME_KEY }}
      - name: Install packaging tools (vpk / wix)
        shell: pwsh
        run: |
          # 版本与本地验证一致:vpk 1.2.0(匹配应用内 Velopack 库),wix 5.0.2(免 OSMF)
          dotnet tool install --global vpk --version 1.2.0
          dotnet tool install --global wix --version 5.0.2
          wix extension add -g WixToolset.UI.wixext/5.0.2
      - name: Publish (x64/arm64 × self-contained/framework-dependent)
        shell: pwsh
        run: |
          $version = '${{ github.event.release.tag_name }}'.TrimStart('v')
          New-Item -ItemType Directory -Force dist | Out-Null
          $targets = @(
            @{ Rid = 'win-x64';   Sc = 'true';  Suffix = '' }
            @{ Rid = 'win-x64';   Sc = 'false'; Suffix = '-noruntime' }
            @{ Rid = 'win-arm64'; Sc = 'true';  Suffix = '' }
            @{ Rid = 'win-arm64'; Sc = 'false'; Suffix = '-noruntime' }
          )
          foreach ($t in $targets) {
            $name = "VelaShell-$version-$($t.Rid)$($t.Suffix)"
            dotnet publish $env:PROJECT -c Release -r $t.Rid -o "out/$name" `
              -p:Version=$version -p:SelfContained=$($t.Sc) -p:PublishSingleFile=true `
              -p:DebugType=None --nologo
            if ($LASTEXITCODE -ne 0) { exit 1 }
            Compress-Archive -Path "out/$name/*" -DestinationPath "dist/$name.zip" -Force
          }
      - name: Build installers (Velopack Setup.exe + WiX MSI, x64/arm64)
        shell: pwsh
        run: |
          $version = '${{ github.event.release.tag_name }}'.TrimStart('v')
          $numeric = $version.Split('-')[0]   # MSI ProductVersion 不允许预发布后缀
          $icon = (Resolve-Path 'src/VelaShell/Assets/velashell.ico').Path
          foreach ($arch in @('x64', 'arm64')) {
            $rid = "win-$arch"
            $packDir = (Resolve-Path "out/VelaShell-$version-$rid").Path

            # EXE 安装器(Velopack):同时产出应用内自动更新所需的 feed 文件
            vpk pack --packId VelaShell --packVersion $version --packDir $packDir `
              --mainExe VelaShell.exe --icon $icon --channel $rid --outputDir "vpk/$rid"
            if ($LASTEXITCODE -ne 0) { exit 1 }
            Move-Item "vpk/$rid/VelaShell-$rid-Setup.exe" "dist/VelaShell-$version-$rid-Setup.exe"
            # 应用内自动更新(GithubSource):更新器需从本 Release 读 feed(releases.$rid.json)并下载
            # 对应架构的完整包(*-full.nupkg),故随 Release 一起发布。其余产物(assets.*.json / 旧版
            # RELEASES-* / Velopack Portable.zip)不发:Setup.exe 已内嵌首装载荷、不参与更新流程。
            Move-Item "vpk/$rid/releases.$rid.json" dist
            Get-ChildItem "vpk/$rid/*-full.nupkg" | Move-Item -Destination dist

            # MSI(WiX 5;WixUI_InstallDir 中文安装向导,支持自定义安装目录)
            wix build installer/VelaShell.wxs -arch $arch -pdbtype none `
              -ext WixToolset.UI.wixext -culture zh-CN `
              -d ProductVersion=$numeric -d "PublishDir=$packDir" -d "IconPath=$icon" `
              -d "LicenseRtf=$((Resolve-Path 'installer/License.rtf').Path)" `
              -o "dist/VelaShell-$version-$rid.msi"
            if ($LASTEXITCODE -ne 0) { exit 1 }
          }
          Get-ChildItem dist | ForEach-Object { $_.Name }
      - uses: actions/upload-artifact@v4
        with:
          name: packages-windows
          path: dist/*
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore strong-name key
        # openssl 在 Linux/macOS 上解码行为一致(避开 GNU/BSD base64 -d/-D 差异)
        run: echo "$SNK_B64" | openssl base64 -A -d > src/VelaShell.snk
        env:
          SNK_B64: ${{ secrets.STRONG_NAME_KEY }}
      - name: Publish (osx-x64 / osx-arm64)
        run: |
          set -euo pipefail
          version="${TAG_NAME#v}"
          mkdir -p dist
          for rid in osx-x64 osx-arm64; do
            name="VelaShell-$version-$rid"
            dotnet publish "$PROJECT" -c Release -r "$rid" -o "out/$name" \
              -p:Version="$version" -p:SelfContained=true -p:PublishSingleFile=true -p:DebugType=None --nologo
            chmod +x "out/$name/VelaShell"
            tar -czf "dist/$name.tar.gz" -C "out/$name" .
          done
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: packages-macos
          path: dist/*
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore strong-name key
        # openssl 在 Linux/macOS 上解码行为一致(避开 GNU/BSD base64 -d/-D 差异)
        run: echo "$SNK_B64" | openssl base64 -A -d > src/VelaShell.snk
        env:
          SNK_B64: ${{ secrets.STRONG_NAME_KEY }}
      - name: Publish (linux-x64 / linux-arm64)
        run: |
          set -euo pipefail
          version="${TAG_NAME#v}"
          mkdir -p dist
          for rid in linux-x64 linux-arm64; do
            name="VelaShell-$version-$rid"
            dotnet publish "$PROJECT" -c Release -r "$rid" -o "out/$name" \
              -p:Version="$version" -p:SelfContained=true -p:PublishSingleFile=true -p:DebugType=None --nologo
            chmod +x "out/$name/VelaShell"
            tar -czf "dist/$name.tar.gz" -C "out/$name" .
          done
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
      - uses: actions/upload-artifact@v4
        with:
          name: packages-linux
          path: dist/*
          if-no-files-found: error

  attach-to-release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Generate SHA256SUMS.txt
        run: |
          set -euo pipefail
          cd dist
          # 对全部资产求和(排除清单自身,避免重定向先建出的空文件把自己算进去)
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -exec sha256sum {} + \
            | sed 's| \./| |' | sort -k2 > SHA256SUMS.txt
          cat SHA256SUMS.txt
      - name: Upload assets to release
        run: |
          set -euo pipefail
          gh release upload "$TAG_NAME" dist/* --clobber --repo "$GITHUB_REPOSITORY"
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.event.release.tag_name }}
